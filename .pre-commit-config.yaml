repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        types_or: [python, pyi]
      - id: ruff-format-check
        name: ruff format check
        entry: ruff format --check
        language: system
        types_or: [python, pyi]
      - id: gitleaks
        name: gitleaks staged secret scan
        entry: gitleaks protect --staged --redact --config .gitleaks.toml
        language: system
        pass_filenames: false
